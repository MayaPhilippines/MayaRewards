<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Maya Treats · Panalo Rewards</title>
  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet" />
  <!-- External CSS -->
  <link rel="stylesheet" href="styles/index.css" />
</head>
<body>
  <div class="main-wrapper">
    <div class="hero-section">
      <!-- Top left logo -->
      <div class="logo-container">
        <img src="images/maya_logo.png" alt="Maya" class="logo" />
      </div>

      <!-- Main content -->
      <div class="content-wrapper">
        <!-- Left side: Text content -->
        <div class="text-content">
          <div class="treats-badge">
            <span class="sparkle">✦</span>
            Enjoy these
            <span class="highlight">TREATS</span>
            <span class="sparkle">✦</span>
          </div>

          <h1 class="main-headline">
            <span class="panalo">PANALO</span>
            <span class="rewards">rewards!</span>
          </h1>

          <p class="sub-text">
            A winning treat reward just for you!
          </p>

          <!-- Reward cards -->
          <div class="reward-cards">
            <div class="reward-card">
              <div class="reward-icon">🎁</div>
              <div class="reward-amount">Up to <span class="amount">P1,000</span></div>
              <div class="reward-label">reward</div>
            </div>
            <div class="reward-card">
              <div class="reward-icon">🏆</div>
              <div class="reward-amount">Up to <span class="amount">P1,000</span></div>
              <div class="reward-label">reward</div>
            </div>
          </div>

          <div class="exclusive-badge">
            <span class="dot"></span>
            Exclusive for <strong>Maya Users</strong>
          </div>

          <!-- CTA Button with Secured statement -->
          <div class="cta-wrapper">
            <button class="claim-btn" id="claimBtn">
              <img src="images/maya_icon.png" alt="icon" class="btn-icon" />
              Claim NOW
            </button>
            <div class="secured-badge">
              <span class="lock-icon">🔒</span>
              Secured &bull; Encrypted
            </div>
          </div>
        </div>

        <!-- Right side: Visual/Decorative -->
        <div class="visual-content">
          <div class="floating-card premium-card">
            <div class="card-glow"></div>
            <div class="card-content">
              <span class="card-badge">🎉</span>
              <div class="card-title">Your Treat</div>
              <div class="card-amount">P1,000</div>
              <div class="card-sub">Reward</div>
              <div class="card-footer">✨ Exclusive</div>
            </div>
          </div>
          <div class="floating-card secondary-card">
            <div class="card-content">
              <span class="card-badge">⭐</span>
              <div class="card-title">Panalo</div>
              <div class="card-amount-small">Reward</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/index.js"></script>
</body>
</html>
